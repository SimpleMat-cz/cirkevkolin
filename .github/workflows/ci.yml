name: CI

on:
  push:
    branches: [main, master, claude/church-website-build-HtpAp]
  pull_request:
    branches: [main, master]

jobs:
  phpunit:
    name: PHPUnit Tests
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: cirkevkolin_test
        ports: ['3306:3306']
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: xdebug

      - name: Install Composer dependencies
        run: COMPOSER_ALLOW_SUPERUSER=1 composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy .env
        run: |
          cp .env.example .env
          echo "DB_CONNECTION=sqlite" >> .env
          echo "DB_DATABASE=:memory:" >> .env

      - name: Generate app key
        run: php artisan key:generate

      - name: Run migrations
        run: php artisan migrate --no-interaction --force

      - name: Run tests
        run: php artisan test --compact

  lint:
    name: PHP Lint (Pint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
      - run: COMPOSER_ALLOW_SUPERUSER=1 composer install --no-interaction --prefer-dist
      - run: ./vendor/bin/pint --test

  frontend:
    name: Frontend (TS + ESLint + Build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: pnpm/action-setup@v4
        with:
          version: '10'
      - name: Install pnpm dependencies
        run: pnpm install --frozen-lockfile
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
      - run: COMPOSER_ALLOW_SUPERUSER=1 composer install --no-interaction --prefer-dist
      - name: Copy .env
        run: cp .env.example .env && php artisan key:generate
      - run: pnpm run lint:check
      - run: pnpm run format:check
      - run: pnpm run types:check
      - run: pnpm run build
