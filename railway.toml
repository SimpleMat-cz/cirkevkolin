[build]
builder = "NIXPACKS"
buildCommand = "composer install --no-dev --optimize-autoloader --ignore-platform-reqs && npm install --legacy-peer-deps && npm run build && php artisan package:discover && php artisan config:clear && php artisan route:clear && php artisan view:clear && php artisan migrate --force"

[deploy]
startCommand = "php artisan serve --host=0.0.0.0 --port=$PORT"
healthcheckPath = "/up"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
